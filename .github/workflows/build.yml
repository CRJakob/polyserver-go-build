name: Build and Release Polyserver for all platforms
on:
  push:
    tags:
    - '*'

jobs:
  build:
    name: Build Polyserver
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: 'stable'

    - name: Create output directory
      run: mkdir -p out

    - name: Generate build matrix
      id: matrix
      run: |
        # Priority targets first
        targets=(
          "windows:amd64"
          "linux:amd64"
          "linux:arm64"
          "darwin:amd64"
          "darwin:arm64"
        )

        # Get all supported targets from Go
        while IFS='/' read -r goos goarch; do
          target="${goos}:${goarch}"
          # Skip if already in priority list
          if [[ ! " ${targets[@]} " =~ " ${target} " ]]; then
            targets+=("$target")
          fi
        done < <(go tool dist list)

        # Output as JSON for matrix
        printf '%s\n' "${targets[@]}" | jq -R . | jq -s . > /tmp/targets.json
        cat /tmp/targets.json

    - name: Build for all platforms
      run: |
        # Priority targets first
        priorities=(
          "windows:amd64"
          "linux:amd64"
          "linux:arm64"
          "darwin:amd64"
          "darwin:arm64"
        )

        # Build priority targets
        for target in "${priorities[@]}"; do
          IFS=':' read -r goos goarch <<< "$target"
          output="out/polyserver_${goos}_${goarch}"
          [ "$goos" = "windows" ] && output="${output}.exe"
          echo "Building $goos/$goarch -> $output"
          env GOOS=$goos GOARCH=$goarch go build -o "$output" .
        done

        # Build all other supported targets
        while IFS='/' read -r goos goarch; do
          target="${goos}:${goarch}"
          # Skip priority targets (already built)
          skip=false
          for priority in "${priorities[@]}"; do
            if [ "$priority" = "$target" ]; then
              skip=true
              break
            fi
          done
          
          if [ "$skip" = false ]; then
            output="out/polyserver_${goos}_${goarch}"
            [ "$goos" = "windows" ] && output="${output}.exe"
            echo "Building $goos/$goarch -> $output"
            env GOOS=$goos GOARCH=$goarch go build -o "$output" . 2>/dev/null || echo "Build failed for $goos/$goarch (may be unsupported or require cgo)"
          fi
        done < <(go tool dist list)

        echo "Build complete. Artifacts:"
        ls -lh out/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: polyserver-builds
        path: out/
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: out/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
