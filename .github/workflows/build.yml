name: Build and Release Polyserver
on:
  push:
    tags:
    - '*'

jobs:
  build:
    name: Build Polyserver
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - { goos: windows, goarch: amd64, output: polyserver_windows_amd64.exe }
        - { goos: windows, goarch: arm64, output: polyserver_windows_arm64.exe }
        - { goos: linux, goarch: amd64, output: polyserver_linux_amd64 }
        - { goos: linux, goarch: arm64, output: polyserver_linux_arm64 }
        - { goos: linux, goarch: 386, output: polyserver_linux_386 }
        - { goos: linux, goarch: arm, output: polyserver_linux_arm }
        - { goos: darwin, goarch: amd64, output: polyserver_darwin_amd64 }
        - { goos: darwin, goarch: arm64, output: polyserver_darwin_arm64 }
        - { goos: freebsd, goarch: amd64, output: polyserver_freebsd_amd64 }
        - { goos: freebsd, goarch: arm64, output: polyserver_freebsd_arm64 }
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: 'stable'

    - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
      run: |
        mkdir -p out
        env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o out/${{ matrix.output }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output }}
        path: out/${{ matrix.output }}
        retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        mkdir -p release
        find artifacts -type f -exec mv {} release/ \;

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
